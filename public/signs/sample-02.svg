<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1322"/>
      <stop offset="0.65" stop-color="#070a12"/>
      <stop offset="1" stop-color="#04060b"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="wash" cx="0.5" cy="0.47" r="0.5">
      <stop offset="0" stop-color="#ffb547" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffb547" stop-opacity="0"/>
    </radialGradient>
    <filter id="halo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="tube" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4.5"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <!-- faint architecture -->
  <rect x="70" y="120" width="180" height="260" fill="#131a2c" opacity="0.5"/>
  <rect x="950" y="90" width="190" height="330" fill="#101726" opacity="0.5"/>
  <rect x="90" y="150" width="60" height="80" fill="#1c2438" opacity="0.5"/>
  <rect x="985" y="130" width="55" height="70" fill="#1c2438" opacity="0.45"/>
  <rect x="1065" y="130" width="55" height="70" fill="#161e30" opacity="0.45"/>
  <rect x="0" y="700" width="1200" height="200" fill="#03050a" opacity="0.85"/>
  <rect x="150" y="640" width="900" height="14" fill="#0f1626" opacity="0.8"/>
  <rect width="1200" height="900" fill="url(#wash)"/>

  <!-- neon: halo, tube, core -->
  <g transform="translate(600 470) rotate(0)" text-anchor="middle"
     font-family="Futura, 'Helvetica Neue', sans-serif" font-weight="bold">
    <g transform="scale(0.72 1)">
      <text y="0" font-size="170" fill="#ffb547" opacity="0.55" filter="url(#halo)">HUỲNH HOA</text>
      <text y="0" font-size="170" fill="#ffb547" filter="url(#tube)">HUỲNH HOA</text>
      <text y="0" font-size="170" fill="#fffdf6" opacity="0.92">HUỲNH HOA</text>
    </g>
    <g font-family="Futura, 'Helvetica Neue', sans-serif" font-weight="normal"
       letter-spacing="14">
      <text y="120" font-size="40" fill="#ffb547" opacity="0.5" filter="url(#halo)">BÁNH MÌ Ổ</text>
      <text y="120" font-size="40" fill="#ffb547" filter="url(#tube)">BÁNH MÌ Ổ</text>
      <text y="120" font-size="40" fill="#fef9ec" opacity="0.85">BÁNH MÌ Ổ</text>
    </g>
  </g>

  <rect width="1200" height="900" fill="url(#vig)"/>
</svg>
